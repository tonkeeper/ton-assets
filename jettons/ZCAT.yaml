name: ZHGUN'S CAT
description: |
  The first humorous work by Yegor Zhgun was this hand-drawn cat. It was his very first original drawing, not counting his earlier political cartoons and satire.

  As is widely known, Yegor does not support the Russian government. That's why the ticker $ZCAT has a double meaning: Zhgun Cat + Z CAT.

  1 Jan. 2014
